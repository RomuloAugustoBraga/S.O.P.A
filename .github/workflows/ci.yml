name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, format & typecheck
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @plataforma-modular/api exec prisma generate
      - run: pnpm check
      - name: Type check (packages)
        run: pnpm typecheck
      - name: Type check (api)
        run: pnpm --filter @plataforma-modular/api run typecheck